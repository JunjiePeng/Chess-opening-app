<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Debut — Chess Opening Trainer</title>
<!-- Install-to-home-screen / app metadata -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#1a1714">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Debut">
<style>
:root {
  --bg: #1a1714; --panel: #262019; --panel2: #2f2820; --line: #3d342a;
  --text: #ece4d8; --dim: #a6988a; --accent: #d4a24e; --accent2: #8fb573;
  --bad: #c96a5b; --light-sq: #ebecd0; --dark-sq: #739552;
  --hl: rgba(255,255,51,.55); --hl-last: rgba(255,255,51,.38);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,-apple-system,sans-serif; min-height:100vh; }
header { padding:max(18px, env(safe-area-inset-top, 0px)) 24px 10px; display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; }
header h1 { font-size:1.5rem; letter-spacing:.5px; cursor:pointer; user-select:none; transition:opacity .15s; }
header h1:hover { opacity:.8; }
header h1 span { color:var(--accent); }
header p { color:var(--dim); font-size:.9rem; }
.layout { display:flex; gap:20px; padding:10px 24px 30px; flex-wrap:wrap; align-items:flex-start; justify-content:center; }

/* ---- menu ---- */
#menu { max-width:1000px; width:100%; }
.op-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:14px; }
#buildTag { text-align:center; color:var(--dim); font-size:.72rem; margin-top:22px; opacity:.6; }
#buildTag b { color:var(--accent); }
#freePlayCard { display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap;
  background:linear-gradient(120deg, #2a2218, #2f2820); border:1px solid var(--accent); border-radius:12px;
  padding:14px 18px; margin-bottom:16px; }
#freePlayCard .fp-text { display:flex; align-items:center; gap:12px; font-size:.95rem; }
#freePlayCard .fp-emoji { font-size:1.8rem; }
#freePlayCard .fp-sub { color:var(--dim); font-size:.82rem; }
#freePlayCard .fp-btns { display:flex; gap:8px; }
.group-head { grid-column:1 / -1; font-size:.85rem; font-weight:600; letter-spacing:.5px;
  color:var(--dim); text-transform:uppercase; margin:10px 0 -4px; padding-left:2px; }
.group-head:first-child { margin-top:0; }
.op-card { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px; }
.op-card.clickable { cursor:pointer; transition:border-color .15s, transform .15s; }
.op-card.clickable:hover { border-color:var(--accent); transform:translateY(-2px); }
.card-foot { font-size:.78rem; color:var(--dim); margin-top:4px; }
.op-card h2 { font-size:1.05rem; display:flex; flex-wrap:wrap; align-items:center; gap:4px 8px; min-width:0; }
.op-card h2 .ico { font-size:1.4rem; color:var(--accent); }
.op-card .desc { color:var(--dim); font-size:.82rem; margin:6px 0 10px; line-height:1.45; }
.op-card h2 .fav-btn { margin-left:auto; background:none; border:none; cursor:pointer; font-size:1.2rem; line-height:1; color:var(--dim); padding:2px 4px; transition:transform .15s, color .15s; }
.op-card h2 .fav-btn:hover { transform:scale(1.25); color:#f5c542; }
.op-card h2 .fav-btn.on { color:#f5c542; }
.line-btn { display:flex; justify-content:space-between; align-items:center; width:100%; text-align:left;
  background:var(--panel2); color:var(--text); border:1px solid var(--line); border-radius:8px;
  padding:9px 12px; margin-top:6px; cursor:pointer; font-size:.88rem; transition:border-color .15s; }
.line-btn:hover { border-color:var(--accent); }
.line-btn .stat { font-size:.75rem; color:var(--dim); white-space:nowrap; margin-left:8px; }
.line-btn .stat.mastered { color:var(--accent2); }
.side-tag { font-size:.7rem; padding:2px 7px; border-radius:10px; margin-left:6px; vertical-align:middle; }
.side-w { background:#e8e2d6; color:#2b2620; } .side-b { background:#3a332b; color:#d6cdc0; border:1px solid var(--line); }
.summary-bar { display:flex; gap:18px; flex-wrap:wrap; background:var(--panel); border:1px solid var(--line);
  border-radius:12px; padding:12px 18px; margin-bottom:16px; font-size:.85rem; color:var(--dim); }
.summary-bar b { color:var(--text); font-size:1.05rem; display:block; }

/* ---- drill ---- */
#drill { display:none; }
#boardCol { display:flex; flex-direction:row; align-items:center; justify-content:center; gap:8px; --bsize:min(92vw, calc(100vh - 170px), 660px); }
#boardStack { display:flex; flex-direction:column; align-items:center; gap:6px; }
.board-wrap { position:relative; }
#evalBarWrap { display:none; width:20px; height:var(--bsize); position:relative; flex:0 0 auto;
  background:#403c39; border:2px solid #15110d; border-radius:5px; overflow:hidden; }
#evalFill { position:absolute; left:0; right:0; bottom:0; height:50%; background:#f0f1e4; transition:height .35s ease; }
#evalBarWrap::after { content:''; position:absolute; left:0; right:0; top:50%; height:1px; background:rgba(212,162,78,.6); }
#evalNum { position:absolute; left:0; right:0; top:3px; text-align:center; font-size:.52rem; font-weight:800;
  color:#e8e2d6; text-shadow:0 0 3px #000, 0 0 3px #000; z-index:2; }
.cap-tray { width:var(--bsize); min-height:22px; display:none; align-items:center; flex-wrap:wrap; }
.cap-tray .cap { display:inline-flex; align-items:center; font-size:19px; line-height:1; margin-right:-1px; }
.cap-tray .bp svg { filter:drop-shadow(0 0 1.5px rgba(255,255,255,.45)); }  /* halo so dark pieces show on the dark panel */
.cap-tray .adv { margin-left:10px; font-weight:700; color:var(--accent2); font-size:.9rem; }
#board {
  display:grid; grid-template-columns:repeat(8,1fr); grid-template-rows:repeat(8,1fr);
  width:var(--bsize); height:var(--bsize);
  border:4px solid #15110d; border-radius:6px; overflow:hidden; user-select:none;
  box-shadow:0 10px 30px rgba(0,0,0,.45); }
.sq { position:relative; display:flex; align-items:center; justify-content:center; cursor:pointer;
  font-size:calc(var(--bsize)/8*.80); line-height:1; min-width:0; min-height:0; }
.sq.anim-top { z-index:3; }
.sq.light { background:var(--light-sq); } .sq.dark { background:var(--dark-sq); }
.sq .pc { pointer-events:none; }
.pc { display:inline-flex; }
.pc svg { width:1em; height:1em; display:block; filter:drop-shadow(0 1px 1px rgba(0,0,0,.3)); }
.sq.sel::after, .sq.hint::after, .sq.last::after { content:''; position:absolute; inset:0; }
.sq.sel::after { background:var(--hl); }
.sq.last::after { background:var(--hl-last); }
.sq.hint::after { box-shadow:inset 0 0 0 4px var(--accent); }
.sq.mv::before { content:''; position:absolute; inset:35%; border-radius:50%;
  background:rgba(0,0,0,.17); z-index:2; pointer-events:none; }
.sq.cp::before { content:''; position:absolute; inset:4%; border-radius:50%;
  border:calc(var(--bsize)*.011) solid rgba(0,0,0,.17); z-index:2; pointer-events:none; }
.sq .coord { position:absolute; font-size:calc(var(--bsize)/8*.17); font-weight:700; opacity:.7; pointer-events:none; }
.sq .coord.file { right:3px; bottom:2px; } .sq .coord.rank { left:3px; top:2px; }
.sq.light .coord { color:var(--dark-sq); } .sq.dark .coord { color:var(--light-sq); }
#board.shake { animation:shake .35s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-7px)} 75%{transform:translateX(7px)} }
.flash-bad { animation:flashbad .4s; }
@keyframes flashbad { 0%{background:var(--bad)} 100%{} }

.side-panel { width:330px; max-width:92vw; display:flex; flex-direction:column; gap:12px; }
.panel-box { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px 16px; }
#lineTitle { font-size:1rem; } #lineTitle small { color:var(--dim); display:block; font-size:.78rem; margin-top:2px; }
#prompt { font-size:.95rem; min-height:46px; display:flex; align-items:center; gap:8px; }
#prompt.good { color:var(--accent2); } #prompt.bad { color:var(--bad); }
#comment { color:var(--dim); font-size:.85rem; line-height:1.5; min-height:60px; }
#comment b { color:var(--accent); }
#movelist { font-size:.88rem; line-height:1.9; color:var(--dim); max-height:140px; overflow-y:auto; }
#movelist .mv { color:var(--text); margin-right:2px; }
#movelist .num { color:var(--dim); margin:0 4px 0 8px; }
#movelist .cur { background:var(--hl); border-radius:4px; padding:1px 4px; color:#fff; }
.progressbar { height:6px; background:var(--panel2); border-radius:3px; overflow:hidden; margin-top:10px; }
.progressbar div { height:100%; background:var(--accent); transition:width .25s; }
.btn-row { display:flex; gap:8px; flex-wrap:wrap; }
button.act { background:var(--panel2); color:var(--text); border:1px solid var(--line); border-radius:8px;
  padding:9px 14px; cursor:pointer; font-size:.86rem; transition:border-color .15s; }
button.act:hover { border-color:var(--accent); }
button.act.primary { background:var(--accent); color:#241c10; border-color:var(--accent); font-weight:600; }
.streak { font-size:.8rem; color:var(--dim); }
.streak b { color:var(--accent2); }
#doneBox { display:none; text-align:center; }
#doneBox .big { font-size:2rem; margin-bottom:6px; }
#doneBox p { color:var(--dim); font-size:.88rem; margin-bottom:12px; }
.toggle { display:inline-flex; border:1px solid var(--line); border-radius:8px; overflow:hidden; }
.toggle button { background:var(--panel2); color:var(--dim); border:none; padding:7px 13px; cursor:pointer; font-size:.82rem; }
.toggle button.on { background:var(--accent); color:#241c10; font-weight:600; }
#overlay { position:absolute; left:4px; top:4px; width:calc(var(--bsize) - 8px); height:calc(var(--bsize) - 8px);
  pointer-events:none; z-index:5; }
#overlay line { stroke:rgba(212,162,78,.8); stroke-width:.14; }
#overlay circle { fill:none; stroke:rgba(143,181,115,.85); stroke-width:.07; }
.line-row { display:flex; flex-wrap:wrap; align-items:center; gap:6px 10px; width:100%; background:var(--panel2);
  border:1px solid var(--line); border-radius:8px; padding:8px 10px; margin-top:6px; font-size:.88rem;
  box-sizing:border-box; overflow:hidden; }
.line-row.faved { border-left:3px solid #f5c542; border-radius:0 8px 8px 0; background:rgba(245,197,66,.06); }
.ln-fav { background:none; border:none; cursor:pointer; font-size:1rem; line-height:1; color:var(--dim);
  padding:0 2px; flex:0 0 auto; transition:transform .15s, color .15s; }
.ln-fav:hover { transform:scale(1.25); color:#f5c542; }
.ln-fav.on { color:#f5c542; }
.ln-info { flex:1 1 130px; min-width:0; display:flex; flex-direction:column; gap:2px; }
.line-row .nm { overflow-wrap:anywhere; line-height:1.3; }
.line-row .stat { font-size:.72rem; color:var(--dim); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.line-row .stat.mastered { color:var(--accent2); }
.ln-btns { display:flex; gap:6px; flex:0 0 auto; margin-left:auto; }
button.mini { background:none; border:1px solid var(--line); color:var(--dim); border-radius:6px;
  padding:4px 0; min-width:54px; text-align:center; cursor:pointer; font-size:.78rem;
  transition:all .15s; flex:0 0 auto; white-space:nowrap; }
button.mini:hover { border-color:var(--accent); color:var(--text); }
#lineSel { flex:1; min-width:0; background:var(--panel2); color:var(--text); border:1px solid var(--line);
  border-radius:6px; padding:6px 8px; font-size:.82rem; cursor:pointer; }
#lineSel:hover { border-color:var(--accent); }
#donePlan { text-align:left; color:var(--dim); font-size:.85rem; line-height:1.5; margin-bottom:12px; }
#donePlan b { color:var(--accent); }
.eng-badge { font-size:.74rem; color:var(--dim); padding:3px 8px; border-radius:10px; }
.eng-badge.ready { color:var(--accent2); }
.eng-badge.loading { color:var(--accent); }
.eng-badge.unavailable { color:var(--bad); cursor:pointer; }
.eng-badge.unavailable:hover { text-decoration:underline; }
#langBar { display:inline-flex; gap:4px; }
#langBar button { background:var(--panel2); color:var(--dim); border:1px solid var(--line); border-radius:7px;
  padding:4px 10px; cursor:pointer; font-size:.78rem; line-height:1; }
#langBar button.on { background:var(--accent); color:#241c10; font-weight:700; border-color:var(--accent); }
#muteBtn { margin-left:0; background:none; border:none; cursor:pointer; padding:4px;
  color:var(--dim); opacity:.6; transition:opacity .15s; line-height:1; }
#muteBtn:hover { opacity:1; }
#muteBtn svg { width:20px; height:20px; display:block; stroke:currentColor; fill:none;
  stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
@media (max-width:900px){ .layout{padding:10px 12px 24px} .side-panel{width:min(82vw,520px)} }

/* ---- phone layout: keep board + prompt + primary buttons on one screen ---- */
@media (max-width:760px){
  header { padding:max(14px, calc(env(safe-area-inset-top, 0px) + 8px)) 14px 6px; gap:8px; }
  header h1 { font-size:1.2rem; }
  header p { display:none; }              /* tagline not needed on small screens */
  .layout { padding:6px 8px 16px; gap:10px; }
  #drill { gap:8px; }
  #boardCol { --bsize:min(96vw, calc(100dvh - 286px - env(safe-area-inset-top, 0px))); }
  .side-panel { width:100%; max-width:100%; gap:8px; display:flex; flex-direction:column; }
  .panel-box { padding:10px 12px; }
  /* reorder: prompt + active buttons sit right under the board */
  #promptBox { order:1; max-height:30vh; overflow:auto; }
  #doneBox   { order:1; }
  #drillNav, #learnNav, #playNav { order:2; }
  #streakInfo { order:3; }
  #titleBox  { order:4; }
  #moveBox   { order:5; }
  #lineTitle { font-size:.92rem; }
  #lineTitle small { font-size:.74rem; }
  #prompt { font-size:.9rem; min-height:0; margin-bottom:4px; }
  #comment { font-size:.82rem; min-height:0; }
  #movelist { max-height:84px; }
  button.act { padding:10px 12px; font-size:.82rem; flex:1 1 auto; }
  .btn-row { gap:6px; }
  .toggle { flex:1 1 100%; }
  .toggle button { flex:1; }
}
@media (max-width:760px) and (max-height:680px){
  #boardCol { --bsize:min(86vw, calc(100dvh - 276px - env(safe-area-inset-top, 0px))); }  /* shorter phones: smaller board */
  #promptBox { max-height:24vh; }
}
</style>
</head>
<body>
<header>
  <h1 id="logo" onclick="showMenu()" title="Back to main menu">♞ De<span>but</span></h1>
  <p data-i18n="tagline">Chess opening trainer — learn the lines, then drill them from memory.</p>
  <span id="engineBadge" class="eng-badge" onclick="retryEngine()" title="Engine status — click to retry"></span>
  <span id="langBar"><button id="langEN" onclick="setLang('en')">EN</button><button id="langZH" onclick="setLang('zh')">中文</button></span>
  <button id="muteBtn" onclick="toggleMute()" title="Toggle sound"></button>
</header>

<div class="layout">
  <!-- ============ MENU ============ -->
  <div id="menu">
    <div id="freePlayCard">
      <div class="fp-text"><span class="fp-emoji">🤖</span><span><b data-i18n="freePlayTitle">Play a full game vs the Engine</b><br><span class="fp-sub" data-i18n="freePlaySub">Start from move 1 — I'll name your opening as you go</span></span></div>
      <div class="fp-btns">
        <button class="act primary" data-i18n="freePlayAsWhite" onclick="startFreePlay('w')">Play as White</button>
        <button class="act" data-i18n="freePlayAsBlack" onclick="startFreePlay('b')">Play as Black</button>
      </div>
    </div>
    <div class="summary-bar" id="summaryBar"></div>
    <div class="op-grid" id="opGrid"></div>
    <div id="buildTag">Debut · build <b>G5</b> · 中文</div>
  </div>

  <!-- ============ DRILL ============ -->
  <div id="drill" class="layout" style="padding:0;">
    <div id="boardCol">
      <div id="evalBarWrap"><div id="evalFill"></div><span id="evalNum"></span></div>
      <div id="boardStack">
        <div id="capTop" class="cap-tray"></div>
        <div class="board-wrap"><div id="board"></div><svg id="overlay" viewBox="0 0 8 8"></svg></div>
        <div id="capBottom" class="cap-tray"></div>
      </div>
    </div>
    <div class="side-panel">
      <div class="panel-box" id="titleBox">
        <div id="lineTitle"></div>
        <div class="progressbar"><div id="progFill" style="width:0%"></div></div>
        <div style="display:flex;gap:8px;margin-top:10px;align-items:center">
          <select id="lineSel" onchange="onLineSel(this.value)"></select>
          <button class="mini" id="annotBtn" onclick="toggleAnnots()" title="Show or hide arrows and key-square markers"></button>
          <button class="mini" id="aimBtn" onclick="toggleAims()" title="Show or hide legal-move dots when you select a piece"></button>
        </div>
        <div id="strengthRow" style="display:none;margin-top:10px">
          <label style="font-size:.78rem;color:var(--dim);display:flex;justify-content:space-between">
            <span data-i18n="engineStrength">Engine strength</span><span id="eloLabel"></span>
          </label>
          <input type="range" id="eloSlider" min="500" max="2400" step="50" value="1000" oninput="onEloInput(this.value)" style="width:100%">
          <button class="mini" id="evalBtn" onclick="toggleEvalBar()" title="Show or hide the engine evaluation bar" style="margin-top:8px"></button>
        </div>
      </div>
      <div class="panel-box" id="promptBox">
        <div id="prompt"></div>
        <div id="comment"></div>
      </div>
      <div class="panel-box" id="doneBox">
        <div class="big">🎉</div>
        <div id="doneMsg"></div>
        <p id="doneStats"></p>
        <div id="donePlan"></div>
        <div class="btn-row" style="justify-content:center">
          <button class="act primary" data-i18n="drillAgain" onclick="startDrill(curOp,curLine,playerSide)">Drill Again</button>
          <button class="act" data-i18n="playVsEngine" onclick="startPlay(curOp,curLine,playerSide)">♟ Play vs Engine</button>
          <button class="act" data-i18n="nextLine" onclick="nextLine()">Next Line →</button>
          <button class="act" data-i18n="lines" onclick="backToLines()">← Lines</button>
        </div>
      </div>
      <div class="panel-box" id="moveBox">
        <div id="movelist">&nbsp;</div>
      </div>
      <div class="btn-row" id="drillNav">
        <button class="act" id="hintBtn" data-i18n="hint" onclick="giveHint()">💡 Hint</button>
        <button class="act" data-i18n="restart" onclick="startDrill(curOp,curLine,playerSide)">↻ Restart</button>
        <span class="toggle" id="sideToggle">
          <button id="sideW" data-i18n="playWhite" onclick="switchSide('w')">Play White</button>
          <button id="sideB" data-i18n="playBlack" onclick="switchSide('b')">Play Black</button>
        </span>
        <button class="act" data-i18n="lines" onclick="backToLines()">← Lines</button>
      </div>
      <div class="btn-row" id="learnNav" style="display:none">
        <button class="act" data-i18n="back" onclick="prevStep()">◀ Back</button>
        <button class="act primary" data-i18n="next" onclick="nextStep()">Next ▶</button>
        <button class="act" data-i18n="drillThisLine" onclick="startDrill(curOp,curLine,playerSide)">🎯 Drill This Line</button>
        <button class="act" data-i18n="lines" onclick="backToLines()">← Lines</button>
      </div>
      <div class="btn-row" id="playNav" style="display:none">
        <button class="act" id="engMoveBtn" data-i18n="engineMove" onclick="engineMoveNow()" title="Let the engine move for you">↻ Engine move</button>
        <button class="act" id="playRestartBtn" data-i18n="restartGame">↺ Restart game</button>
        <button class="act" id="playDrillBtn" data-i18n="backToDrill" onclick="startDrill(curOp,curLine,playerSide)">🎯 Back to Drill</button>
        <button class="act" data-i18n="menu" onclick="showMenu()">← Menu</button>
      </div>
      <div class="streak" id="streakInfo"></div>
    </div>
  </div>
</div>

<script>
/* ================= DATA (validated move sequences) ================= */
const DATA = {"openings":[{"name":"Italian Game","side":"w","icon":"♗","desc":"One of the oldest openings. White develops quickly and aims the bishop at f7, Black's weakest square.","lines":[{"name":"Giuoco Piano (Main Line)","intro":"The 'quiet game' is the perfect first opening: every move follows the golden rules — fight for the center, develop a new piece each move, castle early. Both sides build sound positions before any fighting starts.","plan":"After both sides castle, White's classic plan is the slow build-up: Re1, Nbd2, then reroute the knight Nf1–g3 toward the kingside, and eventually push d4 in one go. Black mirrors with ...Re8 and ...a6, ...Ba7 keeping the bishop. The key battleground squares are d5 and f5 — whoever plants a knight there first usually gets the better middlegame. Avoid trading your good bishop on c4/c5 without getting something for it.","moves":[{"u":"e2e4","san":"e4","c":"Grab a share of the center and open lines for both the queen and the f1-bishop. The center pawns control the key squares d5 and f5.","k":["d5","f5"]},{"u":"e7e5","san":"e5","c":"Black stakes an equal claim. Symmetry means a fair fight over the same central squares."},{"u":"g1f3","san":"Nf3","c":"Develop with a threat — the knight attacks e5, so Black must respond. Developing 'with tempo' means your opponent can't ignore you.","a":["f3e5"]},{"u":"b8c6","san":"Nc6","c":"The most natural reply: defend e5 while developing a piece. Defending with a piece beats defending with a pawn move like ...d6, which blocks the bishop.","a":["c6e5"]},{"u":"f1c4","san":"Bc4","c":"The Italian bishop takes its best diagonal, aiming straight at f7 — the only square defended solely by Black's king. Many beginner attacks (and traps) revolve around f7.","a":["c4f7"],"k":["f7"]},{"u":"f8c5","san":"Bc5","c":"Black mirrors, eyeing f2 in return. The bishop also controls d4, discouraging White's central expansion.","a":["c5f2"],"k":["f2","d4"]},{"u":"c2c3","san":"c3","c":"A pawn move with a plan: prepare d4, building a broad center. Note White delays this until the key pieces are out. A common beginner mistake is pushing pawns before developing.","k":["d4"]},{"u":"g8f6","san":"Nf6","c":"Black develops the last minor piece needed for castling and counterattacks e4. If White gets careless, ...Nxe4 wins a pawn.","a":["f6e4"]},{"u":"d2d3","san":"d3","c":"Defend e4 modestly. The immediate 5.d4 leads to sharp play; d3 keeps the center stable — White will prepare d4 properly later. Slow but safe.","k":["e4"]},{"u":"d7d6","san":"d6","c":"Black solidifies e5 the same way. Both sides have completed the opening's first goal: a stable center and pieces ready to castle.","k":["e5"]},{"u":"e1g1","san":"O-O","c":"Castle! King safety always comes before launching attacks. The rook also steps toward the center files where it belongs.","k":["g1","f1"]},{"u":"e8g8","san":"O-O","c":"Both kings are tucked away. The opening is complete: now the real game begins — see the strategy notes when you finish this line."}]},{"name":"Two Knights Defense (Quiet)","intro":"When Black plays 3...Nf6 instead of 3...Bc5, they counterattack e4 immediately. White's calmest answer is d3, sidestepping the wild Fried Liver complications while keeping a healthy, flexible position.","plan":"White's setup is identical to the Giuoco Piano: c3, Re1, Nbd2–f1–g3, then the d4 break. Black's most active plan is ...d5 in one move if White is slow, or the standard ...a6, ...Ba7 regroup. Watch for the moment Black plays ...d5: after exd5 Nxd5 you should hit the center quickly before Black consolidates.","moves":[{"u":"e2e4","san":"e4","c":"Take the center and free the bishop and queen.","k":["d5","f5"]},{"u":"e7e5","san":"e5","c":"Black claims an equal share."},{"u":"g1f3","san":"Nf3","c":"Develop and attack e5 — forcing Black to deal with the threat.","a":["f3e5"]},{"u":"b8c6","san":"Nc6","c":"Defend e5 with a piece."},{"u":"f1c4","san":"Bc4","c":"Aim at f7 — the Italian setup.","a":["c4f7"],"k":["f7"]},{"u":"g8f6","san":"Nf6","c":"The Two Knights: instead of mirroring, Black counterattacks e4 at once. This is more combative — it invites White to grab material with Ng5, leading to chaos.","a":["f6e4"]},{"u":"d2d3","san":"d3","c":"The mature choice. 4.Ng5 attacks f7 and wins material by force, but the resulting positions are razor-sharp. d3 simply defends e4 and keeps a comfortable game.","k":["e4"]},{"u":"f8e7","san":"Be7","c":"Black develops modestly. Note ...Bc5 was also possible, transposing toward Giuoco Piano waters. Be7 is the most solid — it never becomes a target.","k":["e7"]},{"u":"e1g1","san":"O-O","c":"Castle before anything else. White's position plays itself: every piece has an obvious good square."},{"u":"e8g8","san":"O-O","c":"Black completes the kingside development."},{"u":"f1e1","san":"Re1","c":"The rook takes the e-file before it even opens. When the center eventually breaks open with d4xe5 or ...d5, this rook will already be perfectly placed.","a":["e1e4"],"k":["e4"]},{"u":"d7d6","san":"d6","c":"Black shores up e5. From here both sides maneuver: White eyes d4 and the kingside, Black looks for ...d5 or ...Be6 to trade the strong Italian bishop.","k":["d5"]}]},{"name":"Evans Gambit","intro":"A pawn sacrifice with a clear purpose: b4! deflects Black's bishop, then c3 and d4 build a massive center while Black wastes time with the same bishop. Beloved by attacking players from Morphy to Kasparov.","plan":"White's compensation is concrete: a big center, open lines, and a 2-3 move lead in development. Typical follow-ups are Qb3 (hitting f7), Ba3 (preventing castling!), and e5 kicking the f6-knight. The golden rule of gambit play: never trade queens, keep making threats, and open the position before Black untangles. If Black survives to an endgame, the extra pawn wins — so play with energy.","moves":[{"u":"e2e4","san":"e4","c":"Stake a claim in the center and open lines for the queen and bishop."},{"u":"e7e5","san":"e5","c":"Black claims a share."},{"u":"g1f3","san":"Nf3","c":"Develop with tempo on e5.","a":["f3e5"]},{"u":"b8c6","san":"Nc6","c":"Defend e5 with a piece while developing toward the center."},{"u":"f1c4","san":"Bc4","c":"The Italian bishop, aiming at f7.","a":["c4f7"],"k":["f7"]},{"u":"f8c5","san":"Bc5","c":"Black plays the classical square."},{"u":"b2b4","san":"b4","c":"The Evans Gambit! White offers a wing pawn to drag Black's bishop off its good diagonal and gain time. The pawn matters less than the tempo and the center White gets in return.","a":["b4c5"]},{"u":"c5b4","san":"Bxb4","c":"Black accepts — the critical test. Declining with ...Bb6 is safer but lets White claim space for free."},{"u":"c2c3","san":"c3","c":"The point: attack the bishop AGAIN, gaining another tempo, and prepare the d4 thrust. Black's bishop has now moved three times while White develops with every move.","a":["c3b4"],"k":["d4"]},{"u":"b4a5","san":"Ba5","c":"The main retreat, keeping the pin idea on c3 alive. ...Be7 and ...Bc5 are alternatives, each with drawbacks White can exploit."},{"u":"d2d4","san":"d4","c":"The big center arrives with another threat. White's pawns and pieces all work together; Black has one developed piece — and it's been chased around the board.","a":["d4e5"],"k":["d4","e5"]},{"u":"e5d4","san":"exd4","c":"Black grabs a second pawn, falling further behind. Greed is the engine of White's attack in the Evans."},{"u":"e1g1","san":"O-O","c":"Calm amid the storm: castle, connect the rooks, and prepare cxd4 or Qb3. White is two pawns down but effectively four tempi up — that's a winning trade in open positions.","k":["f7","a3"]}]}]},{"name":"Ruy Lopez","side":"w","icon":"♘","desc":"The 'Spanish Game'. White pressures the knight that defends e5 — perhaps the most classical of all openings.","lines":[{"name":"Main Line (Closed)","intro":"The Ruy Lopez asks Black a long-term question: the b5-bishop pressures the c6-knight, the only defender of e5. White isn't threatening to win a pawn immediately — it's positional pressure that can last 30 moves.","plan":"The closed Spanish is a slow maneuvering battle. White's standard plan: h3 (stopping ...Bg4), d4, and the famous knight tour Nb1–d2–f1–g3 heading for f5. Black counters with ...Na5 hitting the bishop, ...c5 and ...Qc7 claiming queenside space. Don't rush — improve your worst piece each move. The e4/e5 pawn tension defines everything: whoever resolves it carelessly hands the other side the center.","moves":[{"u":"e2e4","san":"e4","c":"Stake a claim in the center and open lines for the queen and bishop."},{"u":"e7e5","san":"e5","c":"Black responds classically."},{"u":"g1f3","san":"Nf3","c":"Develop with tempo — the knight attacks e5, forcing a response.","a":["f3e5"]},{"u":"b8c6","san":"Nc6","c":"Defend e5 with a piece while developing toward the center."},{"u":"f1b5","san":"Bb5","c":"The Spanish move. Unlike the Italian's direct attack on f7, this targets the DEFENDER of e5. The latent threat: Bxc6 followed by Nxe5. It doesn't work yet — but Black must always account for it.","a":["b5c6"],"k":["c6","e5"]},{"u":"a7a6","san":"a6","c":"The Morphy Defense — pose the question immediately. If the bishop takes, Black gets the bishop pair; if it retreats, ...b5 can chase it again later. The world's most played position arises after this move."},{"u":"b5a4","san":"Ba4","c":"Keep the tension. The bishop still eyes c6 through the a4–e8 diagonal, and ...b5 would loosen Black's queenside — a target for a later a4 break.","a":["a4c6"]},{"u":"g8f6","san":"Nf6","c":"Develop and attack e4. Now White faces the same question Black did: defend the pawn or ignore the threat?","a":["f6e4"]},{"u":"e1g1","san":"O-O","c":"Ignore it! If Black grabs e4 (the 'Open Spanish'), White regains the pawn with d4 and Re1 — the e-file pin is deadly. Castling 'into' the threat is a famous lesson: calculate, don't just react.","k":["e4"]},{"u":"f8e7","san":"Be7","c":"Black declines the pawn and prepares to castle. The solid main road."},{"u":"f1e1","san":"Re1","c":"NOW e4 is genuinely defended, renewing the positional threat of Bxc6 and Nxe5. Black's next move is practically forced — can you see why?","a":["e1e4"],"k":["e4"]},{"u":"b7b5","san":"b5","c":"Because of the renewed threat, Black finally breaks the a4–e8 pin idea for good. The cost: the queenside pawns are slightly loosened, which White may target with a4 much later.","a":["b5a4"]},{"u":"a4b3","san":"Bb3","c":"The bishop lands on its permanent home, still glaring at f7 down the a2–g8 diagonal. In many lines it becomes the most dangerous piece on the board.","a":["b3f7"],"k":["f7"]},{"u":"d7d6","san":"d6","c":"Black cements e5 and opens the c8-bishop's path. Quiet consolidation."},{"u":"c2c3","san":"c3","c":"Two ideas in one: prepare the d4 advance, and create an escape square on c2 so ...Na5 never wins the bishop pair. Prophylaxis — preventing the opponent's plan before it happens.","k":["d4","c2"]},{"u":"e8g8","san":"O-O","c":"The main-line tabiya. White will continue h3 then d4; Black chooses between ...Na5, ...Bb7, or ...Re8 setups. A lifetime of chess lives in this position."}]},{"name":"Exchange Variation","intro":"White trades the prized bishop for a clear, simple asset: Black's doubled c-pawns. The deep idea — in a pure pawn endgame White's healthy kingside majority creates a passed pawn, while Black's crippled queenside majority cannot. Bobby Fischer's favorite shortcut.","plan":"White's strategy is brutally clear: trade pieces (not pawns!), play d4, and aim for any endgame. Every exchange increases the value of the superior pawn structure. Black's compensation is the bishop pair — so Black should keep the position rich, avoid trades, and use the half-open d-file. As White: knight to the kingside, f4-f5 majority advance. Count to the endgame: 4 healthy pawns vs 3 beats 4 vs a doubled 4.","moves":[{"u":"e2e4","san":"e4","c":"Stake a claim in the center and open lines for the queen and bishop."},{"u":"e7e5","san":"e5","c":"Black answers classically, claiming an equal share of the center."},{"u":"g1f3","san":"Nf3","c":"Develop with tempo — the knight attacks e5, forcing a response.","a":["f3e5"]},{"u":"b8c6","san":"Nc6","c":"Defend e5 with a piece while developing toward the center."},{"u":"f1b5","san":"Bb5","c":"The Spanish bishop pressures the defender.","a":["b5c6"]},{"u":"a7a6","san":"a6","c":"The Morphy Defense — immediately ask the bishop its intentions."},{"u":"b5c6","san":"Bxc6","c":"The Exchange: White gives up the bishop pair voluntarily — for permanent structural damage. This trade only makes sense because Black must recapture with a pawn, doubling the c-pawns.","k":["c6"]},{"u":"d7c6","san":"dxc6","c":"Recapturing toward the center and freeing the c8-bishop. (...bxc6 would leave the bishop buried and the pawns even weaker.) Black banks on the two bishops for dynamic play.","k":["c6","c7"]},{"u":"e1g1","san":"O-O","c":"Castle first — 5.Nxe5? immediately fails to ...Qd4!, forking knight and e4-pawn, regaining the pawn with a good game. A famous trap; check it yourself!","k":["d4"]},{"u":"f7f6","san":"f6","c":"Black reinforces e5 in ugly-but-solid fashion. The doubled pawns do offer one gift: they control great central squares.","k":["e5"]},{"u":"d2d4","san":"d4","c":"Strike while ahead in development. White wants to liquidate the center and steer toward the favorable endgame.","a":["d4e5"]},{"u":"e5d4","san":"exd4","c":"Black trades — holding the center with ...exd4 declined would drop a pawn eventually."},{"u":"f3d4","san":"Nxd4","c":"Stock-taking: White has the healthy 4-v-3 kingside majority and a lead in development; Black has two bishops and the half-open d-file. Every piece trade from here favors White — remember that as you play on.","k":["d4"]}]},{"name":"Berlin Defense","intro":"The 'Berlin Wall' — Black's most solid answer to the Spanish, famously used by Kramnik to dethrone Kasparov in 2000. Black accepts a slightly worse structure and loses castling rights, but gets the bishop pair and a fortress-like endgame with no weaknesses.","plan":"This IS the endgame — the queens come off by move 8. White's assets: the kingside pawn majority and Black's misplaced king. Black's assets: the bishop pair and a rock-solid structure. White should advance the kingside pawns (h3, g4, e5–e6 ideas) and activate rooks before Black coordinates. Black plays ...Ke8–c8, ...b6, ...Bb7 and simply outlasts. Patience wins here; haste loses.","moves":[{"u":"e2e4","san":"e4","c":"Stake a claim in the center and open lines for the queen and bishop."},{"u":"e7e5","san":"e5","c":"Black answers classically, claiming an equal share of the center."},{"u":"g1f3","san":"Nf3","c":"Develop with tempo — the knight attacks e5, forcing a response.","a":["f3e5"]},{"u":"b8c6","san":"Nc6","c":"Defend e5 with a piece while developing toward the center."},{"u":"f1b5","san":"Bb5","c":"The Spanish bishop takes aim at the knight that defends e5.","a":["b5c6"]},{"u":"g8f6","san":"Nf6","c":"The Berlin: develop and counterattack e4 immediately, skipping ...a6. Black offers to enter deep, technical waters.","a":["f6e4"]},{"u":"e1g1","san":"O-O","c":"The principled reply — defend e4 with tactics, not pawns. White invites Nxe4, having seen further ahead.","k":["e4"]},{"u":"f6e4","san":"Nxe4","c":"Black takes the bait — except it's not quite a bait. This is theory: Black knows the pawn comes back, but believes the resulting endgame is holdable. Watch how White regains it.","k":["e4"]},{"u":"d2d4","san":"d4","c":"The key move: counterattack in the center BEFORE recapturing. Threatens d5 forking, and opens the queen's path to d8. Black cannot keep the extra pawn.","a":["d4e5"],"k":["d5"]},{"u":"e4d6","san":"Nd6","c":"Best — the knight retreats with tempo by attacking the b5-bishop. Every Berlin move has this dual-purpose quality; that's why it's so hard to crack.","a":["d6b5"]},{"u":"b5c6","san":"Bxc6","c":"In-between move: take the knight first, damaging Black's pawns before recapturing on e5.","k":["c6"]},{"u":"d7c6","san":"dxc6","c":"Black accepts doubled pawns to free the bishop — same structural story as the Exchange Variation."},{"u":"d4e5","san":"dxe5","c":"Regain the pawn and kick the d6-knight at the same time. Notice the d-file is now fully open — with both queens standing on it.","a":["e5d6"]},{"u":"d6f5","san":"Nf5","c":"The knight finds its one good square, eyeing the d4 and e3 holes.","k":["d4","e3"]},{"u":"d1d8","san":"Qxd8+","c":"Into the famous Berlin endgame. White trades queens precisely because Black's king must recapture — losing castling rights forever.","a":["d1d8"]},{"u":"e8d8","san":"Kxd8","c":"The Berlin Wall stands: Black's king is stuck in the center, the h8-rook is hard to activate — but the position has no weaknesses to attack. Technical chess from here; see the strategy notes."}]}]},{"name":"Sicilian Defense","side":"b","icon":"♟","desc":"Black's most popular and combative reply to 1.e4. Fight for the center asymmetrically with the c-pawn.","lines":[{"name":"Najdorf Setup","intro":"The Najdorf is the Rolls-Royce of Sicilians — the choice of Fischer and Kasparov. The little move ...a6 prepares everything: ...e5 without allowing Nb5, and queenside expansion with ...b5. Black plays for a win from move one.","plan":"Black's typical scheme: ...e5 (or ...e6), ...Be7, ...O-O, then the thematic ...b5–b4 pawn storm against White's queenside — often racing White's own kingside attack. The d5-square is Black's eternal concern: never let a White knight live there. Remember the Sicilian golden rule: Black's counterplay runs down the half-open c-file (...Rc8, ...Qc7, pressure on c2/c3). If White castles long, the race is on — push those queenside pawns!","moves":[{"u":"e2e4","san":"e4","c":"White takes the center."},{"u":"c7c5","san":"c5","c":"The Sicilian! Instead of mirroring, Black fights for d4 from the wing. The deep point: when White eventually plays d4 and Black trades, Black has swapped a FLANK pawn for a CENTER pawn — a long-term structural profit.","k":["d4"]},{"u":"g1f3","san":"Nf3","c":"White prepares d4 — the Open Sicilian, the most testing approach."},{"u":"d7d6","san":"d6","c":"Control e5 (stopping e4-e5 advances) and open the c8-bishop's diagonal. The flexible Najdorf move order.","k":["e5"]},{"u":"d2d4","san":"d4","c":"White opens the center, accepting the structural trade for piece activity and a development lead."},{"u":"c5d4","san":"cxd4","c":"The cornerstone trade: flank pawn for center pawn. Black now owns the half-open c-file — the highway for all future counterplay.","k":["c2"]},{"u":"f3d4","san":"Nxd4","c":"White recaptures, centralizing the knight."},{"u":"g8f6","san":"Nf6","c":"Develop with tempo — e4 needs defending now.","a":["f6e4"]},{"u":"b1c3","san":"Nc3","c":"White defends e4 with the natural developing move."},{"u":"a7a6","san":"a6","c":"The Najdorf move. It looks passive — it's anything but. It takes b5 away from both White knights and the bishop, preparing ...e5 (which Nb5 would otherwise punish) and the ...b5 expansion. A move that prepares the entire middlegame.","k":["b5","e5"]}]},{"name":"Open Sicilian (Classical)","intro":"The Classical Sicilian: Black develops both knights to their best squares before committing any more pawns. Sound, flexible, and a great way to learn Open Sicilian structures without memorizing forcing lines.","plan":"Black's standard development: ...e6 (or ...g6), ...Be7, ...O-O, ...Qc7 and rooks to c8/d8. The recurring themes of every Open Sicilian apply: pressure down the c-file, a timely ...d5 break to free the position, and vigilance over the d5-square. White usually attacks with f3/Be3/Qd2 and a kingside pawn storm, or Bc4 pressure — meet wing attacks with the central ...d5 counterstrike.","moves":[{"u":"e2e4","san":"e4","c":"White takes the center."},{"u":"c7c5","san":"c5","c":"The Sicilian — asymmetric fight for d4.","k":["d4"]},{"u":"g1f3","san":"Nf3","c":"White prepares the d4 break — heading for the Open Sicilian."},{"u":"b8c6","san":"Nc6","c":"Develop the knight to its most natural square, adding control over d4 and e5.","k":["d4","e5"]},{"u":"d2d4","san":"d4","c":"The Open Sicilian — White opens the center, the most testing approach."},{"u":"c5d4","san":"cxd4","c":"Flank pawn for center pawn — Black's structural profit, plus the half-open c-file.","k":["c2"]},{"u":"f3d4","san":"Nxd4","c":"White recaptures, placing the knight powerfully in the center."},{"u":"g8f6","san":"Nf6","c":"Develop with tempo on e4.","a":["f6e4"]},{"u":"b1c3","san":"Nc3","c":"White defends e4 with the most natural developing move."},{"u":"d7d6","san":"d6","c":"The Classical setup complete: e5 is controlled, the bishop diagonal is open, and Black hasn't committed to a plan yet — ...e6, ...g6, or ...e5 are all still possible. Flexibility is strength."}]},{"name":"Alapin (2.c3) — White's view","intro":"Tired of facing twenty Sicilian systems? The Alapin cuts through: White simply prepares d4 and builds the center with pawns. Black's sharpest weapons don't work here — the game becomes positional, on White's terms.","plan":"White typically gets pawns on d4 and e5 with free development — a space advantage that cramps Black all game. The plans: develop with Bc4 or Be2, castle, and use the extra space to maneuver (Re1, Bf4/Bg5, Nbd2). Black will chip with ...d6 and pressure d4; hold the center calmly with Be3/Nbd2 rather than grabbing more space. If the center pawns get traded, aim for active piece play against Black's isolated d-pawn positions.","moves":[{"u":"e2e4","san":"e4","c":"Stake a claim in the center and open lines for the queen and bishop."},{"u":"c7c5","san":"c5","c":"The Sicilian — Black fights for d4 from the flank, unbalancing the game."},{"u":"c2c3","san":"c3","c":"The Alapin's honest plan: support d4 with a pawn, so that after d4 cxd4, cxd4 White keeps the full pawn center. The drawback — the b1-knight loses its best square — is exactly what Black tries to exploit.","k":["d4"]},{"u":"g8f6","san":"Nf6","c":"Black's best: attack e4 immediately, exploiting that Nc3 is unavailable (the pawn took the square!). White must push the pawn, which Black will undermine.","a":["f6e4"]},{"u":"e4e5","san":"e5","c":"Gain space and kick the knight — the only good way to defend.","a":["e5f6"]},{"u":"f6d5","san":"Nd5","c":"The knight sits beautifully on d5, un-evictable by pawns (c4? would weaken d4 forever). Black's whole setup works around this knight.","k":["d5"]},{"u":"d2d4","san":"d4","c":"Build the intended center."},{"u":"c5d4","san":"cxd4","c":"Black trades before White gets everything set up."},{"u":"g1f3","san":"Nf3","c":"The professional touch: develop first and recapture with the c-pawn next, keeping the d4+e5 duo intact. Rushing cxd4 first invites an early ...d6 strike.","k":["d4"]},{"u":"b8c6","san":"Nc6","c":"Black develops with pressure on d4 and e5.","a":["c6d4"]},{"u":"c3d4","san":"cxd4","c":"The dream structure: pawns on d4 and e5 grant White space and attacking chances. This duo is the whole point of the Alapin.","k":["d4","e5"]},{"u":"d7d6","san":"d6","c":"Black strikes back immediately — correct play. The center must be challenged before it becomes overwhelming. A fair, instructive middlegame follows.","a":["d6e5"]}]}]},{"name":"Queen's Gambit","side":"w","icon":"♕","desc":"White's classical 1.d4 weapon: offer the c-pawn to deflect Black's d-pawn and dominate the center.","lines":[{"name":"QGD Main Line","intro":"The Queen's Gambit Declined is chess's aristocrat — over a century of world championship pedigree. Black calmly protects d5 and accepts a slightly cramped but extraordinarily solid position. White gets enduring pressure; Black waits for the right moment to free the position.","plan":"White's two classic plans: (1) the minority attack — b4–b5 creating a weak Black queenside pawn to besiege all game, or (2) central play with Qc2, Rd1 and a timely e4. Black's freedom plan is always the same: trade pieces (a cramped position loves trades), then break with ...c5 or ...e5 at the right moment. The c8-bishop is Black's problem child — getting it to f5 or g4 (often after ...dxc4 and ...b5) means Black has equalized.","moves":[{"u":"d2d4","san":"d4","c":"Claim the center with built-in protection — unlike e4, this pawn is guarded by the queen. 1.d4 openings are slower burns: structure and squeezing replace quick strikes.","k":["d4"]},{"u":"d7d5","san":"d5","c":"Black claims an equal share and blocks the center."},{"u":"c2c4","san":"c4","c":"The Queen's Gambit — not really a gambit! If Black takes, White regains the pawn comfortably. The real idea: pressure d5 sideways to either remove it (gaining central control) or force Black into passive defense.","a":["c4d5"],"k":["d5"]},{"u":"e7e6","san":"e6","c":"Declined — Black keeps a pawn on d5 at the small cost of boxing in the c8-bishop. That bishop becomes the defining piece of the whole opening: Black spends the next ten moves trying to free it.","k":["c8"]},{"u":"b1c3","san":"Nc3","c":"Develop with more pressure on d5.","a":["c3d5"]},{"u":"g8f6","san":"Nf6","c":"Defend d5 and develop — move for move, the same battle."},{"u":"c1g5","san":"Bg5","c":"The classical pin: the f6-knight is d5's key defender, so White ties it down. Indirect pressure on d5 through the pin — a lesson in attacking a strongpoint via its defenders.","a":["g5f6"],"k":["d5"]},{"u":"f8e7","san":"Be7","c":"Calmly break the pin. No weaknesses, no drama — the QGD way."},{"u":"e2e3","san":"e3","c":"Solidify d4 and open the f1-bishop's diagonal. Note White's restraint: the position stays compact, every piece protected.","k":["d4"]},{"u":"e8g8","san":"O-O","c":"Black castles into safety."},{"u":"g1f3","san":"Nf3","c":"Complete the kingside development. Bd3, O-O and Rc1 come next — then White chooses between the minority attack and central expansion."},{"u":"b8d7","san":"Nbd7","c":"The classical QGD tabiya. The knight supports both ...c5 and ...e5 breaks and can reroute via b6 or f8. Cramped but unbreakable — Capablanca won countless games from here with both colors."}]},{"name":"Queen's Gambit Accepted","intro":"Black takes the pawn — not to keep it, but to trade central tension for quick, free development. Black gives back the pawn at the right moment and strikes at d4 with ...c5, aiming for full equality in an open game.","plan":"White gets the freer game and a central majority; the question is whether it becomes an attack or a target. White's ideal: build with Qe2, Rd1, e4 and roll the center forward. Black's standard equalizing sequence: ...c5xd4 creating an isolated queen's pawn (IQP) for White, then blockade d5 with knights and trade pieces — an IQP grows weaker with every exchange. As White, attack before the simplification: Bd3, Qe2, and watch for Bxh7+ Greek-gift sacrifices when Black castles early.","moves":[{"u":"d2d4","san":"d4","c":"Stake a claim in the center and open lines for the queen and bishop."},{"u":"d7d5","san":"d5","c":"Black claims a share."},{"u":"c2c4","san":"c4","c":"The Queen's Gambit offer: pressure d5 from the side to win the center.","a":["c4d5"]},{"u":"d5c4","san":"dxc4","c":"Accepted! Black surrenders the center temporarily. The plan is NOT to keep the pawn (tries like ...b5 lose time badly) — it's to develop fast while White spends a move recapturing.","k":["c4"]},{"u":"g1f3","san":"Nf3","c":"Develop first and prevent ...e5, which would free Black's game instantly. Stopping the opponent's best move is as valuable as making your own.","k":["e5"]},{"u":"g8f6","san":"Nf6","c":"Black develops naturally, also controlling e4."},{"u":"e2e3","san":"e3","c":"Open the bishop's path to reclaim c4."},{"u":"e7e6","san":"e6","c":"Black mirrors, preparing ...c5 — the key strike. Note Black's c8-bishop is blocked for now, just like in the QGD; ...b6 and ...Bb7 will solve it later."},{"u":"f1c4","san":"Bxc4","c":"Pawn regained with a developing move — the gambit's accounting always balances. The bishop sits actively on the a2–g8 diagonal.","a":["c4e6"],"k":["e6"]},{"u":"c7c5","san":"c5","c":"The thematic counter-strike at d4. Black challenges the center before White consolidates with Qe2 and Rd1. Without this move, Black would slowly suffocate.","a":["c5d4"],"k":["d4"]},{"u":"e1g1","san":"O-O","c":"Castle and keep the small pull: better development and a central majority. The middlegame question: will d4 become a passed pawn or a weakness?"},{"u":"a7a6","san":"a6","c":"Preparing ...b5 and ...Bb7 — finally activating the problem bishop, with queenside space as a bonus. A rich, balanced middlegame; see the strategy notes."}]},{"name":"Slav Defense Main Line","intro":"The Slav fixes the QGD's one flaw: by defending d5 with ...c6 instead of ...e6, the c8-bishop keeps its freedom and develops to f5 — actively placed before the pawn chain closes. Solid as granite, but with more dynamic potential than the QGD.","plan":"Black's setup completes with ...e6, ...Bb4 or ...Be7, and ...O-O — every piece on a sensible square, no weaknesses. White's space advantage is real but hard to convert: the standard plans are e4 (after Bg5/e3 preparation) or queenside pressure with Qb3. Black counters with ...e5 or ...c5 breaks once developed. The a4-pawn White played has a cost — the b4-square belongs to Black forever; a knight or bishop landing there is the Slav player's reward.","moves":[{"u":"d2d4","san":"d4","c":"Stake a claim in the center and open lines for the queen and bishop."},{"u":"d7d5","san":"d5","c":"Black claims a share."},{"u":"c2c4","san":"c4","c":"The Queen's Gambit offer: pressure d5 from the side to win the center.","a":["c4d5"]},{"u":"c7c6","san":"c6","c":"The Slav point: defend d5 while leaving the c8–h3 diagonal open. Compare with the QGD's ...e6 — same solidity, but the bishop thanks you. The small cost: c6 takes the best square from the b8-knight.","k":["c8"]},{"u":"g1f3","san":"Nf3","c":"Natural development, watching e5."},{"u":"g8f6","san":"Nf6","c":"Black develops a piece toward the center."},{"u":"b1c3","san":"Nc3","c":"More pressure on d5. White's setup is identical to the QGD — the difference is all in Black's camp.","a":["c3d5"]},{"u":"d5c4","san":"dxc4","c":"Now Black takes! The timing is the point: with ...c6 played, Black threatens to HOLD the pawn with ...b5. White must spend a move preventing it — and that move has a price.","k":["b5"]},{"u":"a2a4","san":"a4","c":"Stop ...b5, intending to regain c4. The cost: b4 is now a permanent hole in White's queenside — Black's pieces will use it for the rest of the game. Every pawn move creates a weakness somewhere.","k":["b4"]},{"u":"c8f5","san":"Bf5","c":"The Slav's payoff move: the bishop reaches its dream square BEFORE ...e6 closes the diagonal. Compare this bishop with its sad QGD cousin on c8. Black completes development smoothly next: ...e6, ...Bb4, ...O-O.","k":["f5","b4"]}]}]},{"name":"London System","side":"w","icon":"♖","desc":"A sturdy, low-theory system: d4, Bf4, e3, and the same solid setup against almost anything.","lines":[{"name":"Main Line vs ...d5","intro":"The London is a system, not a sequence — the same sound setup (d4, Bf4, e3, Bd3, Nbd2, c3) against nearly anything Black does. Perfect when you'd rather understand one structure deeply than memorize twenty variations. The f4-bishop, developed OUTSIDE the pawn chain, is the system's soul.","plan":"The London pyramid (c3–d4–e3) is nearly impregnable. White's main plans: (1) the Ne5 outpost — plant the knight, support with f4 if needed, and attack f7/h7; (2) the slow kingside attack with Bd3, Ne5, Qf3–h3; (3) in the endgame, the queenside majority after dxc5. Black's counterplay comes down the c-file with ...Qb6 hitting b2 — know the response Qb3 (or Rb1). Don't rush: the London wins by improving pieces while Black runs out of useful moves.","moves":[{"u":"d2d4","san":"d4","c":"Take the center, queen-protected."},{"u":"d7d5","san":"d5","c":"Black mirrors, claiming an equal share of the center."},{"u":"c1f4","san":"Bf4","c":"The London move, and the key idea of the whole system: develop the bishop OUTSIDE the pawn chain BEFORE playing e3. The QGD showed what happens to a bishop locked behind its own pawns — White makes sure it never happens here.","k":["f4"]},{"u":"g8f6","san":"Nf6","c":"Black develops the knight to its most natural square."},{"u":"e2e3","san":"e3","c":"Now build the pyramid behind the bishop. The structure c3–d4–e3 (c3 comes soon) defends itself — that's why the London needs so little memorization.","k":["d4"]},{"u":"e7e6","san":"e6","c":"Black builds symmetrically — accepting the same bad-bishop problem White just avoided."},{"u":"g1f3","san":"Nf3","c":"Develop, control e5 — the square White's whole middlegame revolves around.","k":["e5"]},{"u":"f8d6","san":"Bd6","c":"Black sensibly challenges the London bishop — it's White's best piece, so trading it is good business for Black."},{"u":"f4g3","san":"Bg3","c":"Refuse the trade! If Black captures on g3, White recaptures with the h-pawn — opening the h-file for the rook, a free attacking road. Black usually regrets that trade; meanwhile the bishop keeps living on the b8–h2 diagonal.","k":["g3","h2"]},{"u":"e8g8","san":"O-O","c":"Black castles — king safety before the middlegame begins."},{"u":"f1d3","san":"Bd3","c":"The attacking diagonal, pointed at h7. Together with a future Ne5, this creates real mating threats — the London is quiet, not toothless.","a":["d3h7"],"k":["h7"]},{"u":"c7c5","san":"c5","c":"Black's correct counterplay: hit d4 and open the c-file. Expect ...Qb6 next, targeting the b2-pawn the London bishop left behind — the system's one tender spot.","a":["c5d4"],"k":["b2"]},{"u":"c2c3","san":"c3","c":"Complete the pyramid. d4 is now defended three times; the structure absorbs the pressure effortlessly.","k":["d4"]},{"u":"b8c6","san":"Nc6","c":"A standard London middlegame: White will castle, reroute with Nbd2 and aim for the Ne5 outpost. Solid for White, flexible for Black — see the strategy notes."}]},{"name":"vs King's Indian Setup","intro":"Against the fianchetto, the London keeps its shape but shifts its concern: Black's g7-bishop bears down on d4, and the ...e5 break is coming. White's setup stays solid, controls e5 by piece-count, and relies on h3 to preserve the key dark-squared bishop.","plan":"Black wants ...Nbd7 and ...e5 — you usually can't prevent it forever, so prepare to meet it well: keep d4 firmly guarded (c3, Nbd2), and when ...e5 comes, choose between dxe5 (then occupy the d-file and c4/e4 squares) or letting the tension stand. The h3–Bh2 resource keeps your best piece alive. Long-term: queenside space with c4 and b4 is White's healthiest plan, since Black owns the kingside dark squares. Respect the g7-bishop — never open the long diagonal carelessly.","moves":[{"u":"d2d4","san":"d4","c":"Stake a claim in the center and open lines for the queen and bishop."},{"u":"g8f6","san":"Nf6","c":"Black stays flexible, hinting at Indian setups."},{"u":"c1f4","san":"Bf4","c":"London regardless — the system's promise: one setup against everything.","k":["f4"]},{"u":"g7g6","san":"g6","c":"Black announces the King's Indian plan: fianchetto, castle, then strike with ...e5 or ...c5. A completely different animal from ...d5 setups — the center stays fluid."},{"u":"e2e3","san":"e3","c":"The usual London structure: e3 supports d4 from behind the bishop."},{"u":"f8g7","san":"Bg7","c":"The KID bishop takes the long diagonal, staring at d4 and beyond toward b2. This piece is the heart of every Black plan — track what it sees at all times.","a":["g7d4"],"k":["d4","b2"]},{"u":"g1f3","san":"Nf3","c":"Develop while adding a defender to d4 and controlling e5 — the square Black most wants to claim.","k":["e5","d4"]},{"u":"e8g8","san":"O-O","c":"Black castles quickly, completing the standard KID sequence."},{"u":"f1e2","san":"Be2","c":"Modest on purpose: on d3 the bishop would block White's own queen from defending d4, and ...Nh5 tricks gain strength. Be2 keeps everything coordinated. Sometimes the humble square is the right square.","k":["d4"]},{"u":"d7d6","san":"d6","c":"Black prepares the thematic ...Nbd7 and ...e5 break — the KID's core plan against every White setup."},{"u":"h2h3","san":"h3","c":"A small move with a big job: when Black plays ...Nh5 hunting the bishop, it now slips back to h2, staying on its diagonal. Preserving your best piece is worth a tempo. White castles next and meets ...e5 with confidence.","k":["h2","g4"]}]}]},{"name":"French Defense","side":"b","icon":"♛","desc":"Solid and counterattacking: Black lets White build a center, then strikes it with ...c5 and ...f6.","lines":[{"name":"Advance Variation","intro":"When White locks the center with e5, the position becomes a textbook pawn-chain battle: White owns the kingside, Black owns the queenside, and the whole game revolves around the base of White's chain — d4. Black's plan is beautifully clear: pile everything onto that square.","plan":"Black's pressure scheme is a machine: ...Qb6, ...Nh6–f5 (yes, via the rim!), ...cxd4 and sometimes ...f6 to attack the chain's head too. White must defend d4 with everything and seek kingside space. Two big ideas to remember: Black often delays or even skips castling (the locked center makes the king safe in the middle), and the 'bad' c8-bishop seeks life via ...Bd7–b5, trading itself for White's good pieces. If d4 falls, Black wins the strategic battle outright.","moves":[{"u":"e2e4","san":"e4","c":"White takes the center."},{"u":"e7e6","san":"e6","c":"The French: prepare ...d5 with full support. Black volunteers to block the c8-bishop — the famous 'French bishop' problem — in exchange for an unbreakable pawn duo and rich counterattacking plans.","k":["d5","c8"]},{"u":"d2d4","san":"d4","c":"White builds the dream center — temporarily."},{"u":"d7d5","san":"d5","c":"Challenge it immediately. White must now choose the variation: push (e5), trade (exd5), or defend (Nc3/Nd2). Each leads to a different world.","a":["d5e4"]},{"u":"e4e5","san":"e5","c":"The Advance: White grabs kingside space and fixes the structure. The pawn chain d4–e5 points where White will attack — the kingside. But every chain has a base...","k":["d4","e5"]},{"u":"c7c5","san":"c5","c":"...and Black attacks it instantly. THE strategic lesson of the French: strike a pawn chain at its base (d4), not its head. Everything Black does for the next ten moves serves this square.","a":["c5d4"],"k":["d4"]},{"u":"c2c3","san":"c3","c":"White reinforces the base."},{"u":"b8c6","san":"Nc6","c":"Second attacker on d4. Black develops every piece toward the same target — concentration of force on one weak point.","a":["c6d4"]},{"u":"g1f3","san":"Nf3","c":"A second defender arrives for d4 — development with a defensive job."},{"u":"d8b6","san":"Qb6","c":"Third attacker — and the queen also eyes b2, tying White's c1-bishop to its defense. This is the Advance French tabiya: the siege of d4 is fully set. Next comes ...Nh6–f5 or ...cxd4 and ...Nge7–f5, adding the final attacker.","a":["b6d4","b6b2"],"k":["d4","b2"]}]},{"name":"Exchange Variation","intro":"White trades on d5 and the French's famous tension evaporates: symmetrical pawns, open lines, free development for both sides. Black's 'bad bishop' problem is solved instantly. Often chosen hoping for a quiet draw — but symmetry rewards whoever plays with more purpose.","plan":"Don't let symmetry lull you to sleep — it breaks the moment someone gains a tempo. The e-file is the whole game early on: both sides race rooks to e1/e8. Black equalizes comfortably with natural moves (...Bd6, ...O-O, ...Bg4, ...Nc6 or ...c6 with ...Re8), then plays for more: ideas include ...Ne4, ...Qf6 pointing at the kingside, or a minority-style ...b5–b4 if White commits to c3. The first player to run out of useful moves loses the symmetry battle.","moves":[{"u":"e2e4","san":"e4","c":"White takes the center."},{"u":"e7e6","san":"e6","c":"The French — solid, counterattacking, preparing ...d5 with support."},{"u":"d2d4","san":"d4","c":"White builds the broad two-pawn center — strong now, a target later."},{"u":"d7d5","san":"d5","c":"Challenge e4 immediately — the supported ...d5 strike is the point of the opening.","a":["d5e4"]},{"u":"e4d5","san":"exd5","c":"The Exchange — White releases the tension immediately. Objectively harmless, but it carries one lesson: without central tension, piece activity decides everything.","k":["d5"]},{"u":"e6d5","san":"exd5","c":"And just like that, Black's eternal problem piece — the c8-bishop — is free. Black has zero structural worries; the only question is who uses the open lines better.","k":["c8"]},{"u":"g1f3","san":"Nf3","c":"White continues developing toward a quick castle."},{"u":"g8f6","san":"Nf6","c":"Develop naturally, controlling e4. In symmetric positions, develop toward the center and grab the open file first."},{"u":"f1d3","san":"Bd3","c":"White takes the best diagonal."},{"u":"f8d6","san":"Bd6","c":"Mirror it — this bishop placement guards e5 and supports a later kingside initiative. Symmetry is fine for Black: White must prove something, and there's nothing to prove.","k":["e5"]},{"u":"e1g1","san":"O-O","c":"White castles, completing the opening's first duty."},{"u":"e8g8","san":"O-O","c":"Castled and equal. Now the real contest: rooks to the e-file, then ...Bg4 or ...Nc6. Whoever finds more active squares wins this 'drawish' position — see the strategy notes."}]},{"name":"Tarrasch Variation","intro":"White's Nd2 defends e4 while dodging the annoying ...Bb4 pin — at the cost of blocking the c1-bishop. Black's sharpest answer is an immediate ...c5, accepting an isolated d-pawn in return for free, active piece play. A classic structure-versus-activity bargain.","plan":"Black's game plan flows from the isolated d5-pawn: use the piece activity it provides BEFORE it becomes an endgame weakness. Develop fast (...Nc6, ...Bd6, ...Nge7 or ...Nf6, ...O-O), occupy e4 with a knight, and generate kingside threats — the IQP grants the e4 and c4 squares as outposts. Avoid piece trades (each one magnifies the pawn's weakness) and never drift into a pure endgame. If White blockades d4 and trades pieces, sit tight: the d-pawn is defensible, and ...d4 breaks can liquidate it at the right moment.","moves":[{"u":"e2e4","san":"e4","c":"White takes the center."},{"u":"e7e6","san":"e6","c":"The French — solid, counterattacking, preparing ...d5 with support."},{"u":"d2d4","san":"d4","c":"White builds the broad two-pawn center — strong now, a target later."},{"u":"d7d5","san":"d5","c":"Challenge e4 immediately — the supported ...d5 strike is the point of the opening.","a":["d5e4"]},{"u":"b1d2","san":"Nd2","c":"The Tarrasch: defend e4 while keeping c3 free for a pawn — and crucially, ...Bb4+ no longer pins anything. The price: the knight blocks its own bishop. Every square choice is a trade-off.","k":["e4","c3"]},{"u":"c7c5","san":"c5","c":"Black's most ambitious reply: strike the center NOW, while the d2-knight is awkward. Black accepts isolated-pawn positions in exchange for the freest development the French ever offers.","a":["c5d4"],"k":["d4"]},{"u":"e4d5","san":"exd5","c":"White opens the center to fix Black with the isolated pawn."},{"u":"e6d5","san":"exd5","c":"There it is: Black's d5-pawn has no pawn neighbors — isolated. Weak in the endgame, but it grants open lines and the e4/c4 outposts. Black chose this on purpose: activity now, accountability later.","k":["d5","e4","c4"]},{"u":"g1f3","san":"Ngf3","c":"White develops, already eyeing the d4 blockade square in front of the isolani — the standard anti-IQP strategy: blockade, then besiege.","k":["d4"]},{"u":"b8c6","san":"Nc6","c":"Black develops with maximum activity, fighting for d4."},{"u":"f1b5","san":"Bb5","c":"White pins, intending to castle and increase the grip on d4."},{"u":"f8d6","san":"Bd6","c":"Active development, pointing at the kingside. Black's pieces flow to natural squares — the IQP's gift. Next: ...Nge7, ...O-O, and piece play before White's blockade settles. See the strategy notes for the full IQP battle plan.","k":["e4"]}]}]},{"name":"Caro-Kann Defense","side":"b","icon":"♜","desc":"Solid like the French, but the light-squared bishop gets out before ...e6. A favorite for beginners and world champions alike.","lines":[{"name":"Classical Variation","intro":"The Caro-Kann's main line showcases its whole philosophy: build the same solid ...d5 structure as the French, but develop the light-squared bishop FIRST. Black gets a position with no weaknesses and a clear piece plan — at the cost of a small concession in space.","plan":"Black's development scheme is almost automatic: ...e6, ...Ngf6 (or ...Bd6), ...O-O (or sometimes ...Qc7 and ...O-O-O), and the central break ...c5 at the right moment — the same base-strike idea as the French, but with the good bishop already traded or tucked safely on h7. White's space means Black shouldn't rush: trade a pair of minor pieces, keep the structure intact, and the endgame will smile on you — Caro-Kann endgames are famously pleasant. Watch White's h-pawn advance: it gained kingside space, which becomes a target for a later ...g5 or endgame counterplay.","moves":[{"u":"e2e4","san":"e4","c":"White takes the center."},{"u":"c7c6","san":"c6","c":"The Caro-Kann: prepare ...d5 while keeping the c8–h3 diagonal open. Compare the French ...e6 — same plan, but THIS pawn doesn't bury the bishop. The cost: c6 takes the knight's best square, and Black concedes a little time.","k":["d5","c8"]},{"u":"d2d4","san":"d4","c":"White builds the full pawn center — Black will challenge it at once."},{"u":"d7d5","san":"d5","c":"Challenge e4 with full support.","a":["d5e4"]},{"u":"b1c3","san":"Nc3","c":"White defends e4 with a piece, keeping all options."},{"u":"d5e4","san":"dxe4","c":"Black releases the tension at the right moment — before White gets e5 in under better circumstances. Trading the d-pawn for the e-pawn leaves a small but lasting structural plus: 3 pawns vs 2 on the queenside."},{"u":"c3e4","san":"Nxe4","c":"White recaptures with a beautifully centralized knight — temporarily."},{"u":"c8f5","san":"Bf5","c":"The Caro-Kann's signature move and its whole reason for existing: the bishop develops to its best diagonal WITH TEMPO on the knight, before ...e6 would lock it in. This one move justifies 1...c6.","a":["f5e4"],"k":["f5"]},{"u":"e4g3","san":"Ng3","c":"White saves the knight by attacking the bishop — gaining time back.","a":["g3f5"]},{"u":"f5g6","san":"Bg6","c":"The bishop's safe haven. It looks passive on g6 but watch: it controls the b1–h7 diagonal, and after the coming trade on d3 or h7, Black's position has zero bad pieces."},{"u":"h2h4","san":"h4","c":"Aggressive: White threatens h5 trapping the bishop! Black must create an escape hatch immediately. White banks space; the h-pawn may later become weak — a real investment, not a free move.","a":["h4h5"],"k":["h5"]},{"u":"h7h6","san":"h6","c":"The essential response — NEVER forget this move. It gives the bishop a retreat on h7 and stops White's h5–h6 ideas. Skipping it loses a piece to h5. Drill it into memory.","k":["h7"]},{"u":"g1f3","san":"Nf3","c":"White continues developing toward a quick castle."},{"u":"b8d7","san":"Nd7","c":"The careful move order: prepare ...Ngf6 so that after Nxf6+, Black recaptures with the KNIGHT (...Nxf6), keeping the pawn structure pristine. Structure first — that's the Caro-Kann creed. Development continues ...e6, ...Bd6, ...O-O."}]},{"name":"Advance Variation","intro":"Against the space-grabbing e5, the Caro-Kann shows its superiority over the French in one move: ...Bf5, developing the bishop OUTSIDE the chain before ...e6. Black gets the French's solid structure with none of its bad-bishop sorrow.","plan":"Black has two healthy plans, often combined: the ...c5 base-strike (the French recipe, but more comfortable here), and piece pressure with ...Ne7–f5 plus ...Nd7 against d4. The thematic maneuver ...Ne7–g6 (or ...f5!?) also fights for the e5/f4 squares. White's extra space wants a kingside expansion (g4!? chasing your bishop) — meet flank aggression with the central ...c5 break, the universal answer. Endgames favor Black's healthier structure; trade into them happily.","moves":[{"u":"e2e4","san":"e4","c":"White takes the center."},{"u":"c7c6","san":"c6","c":"The Caro-Kann — prepare ...d5 while keeping the bishop's diagonal free."},{"u":"d2d4","san":"d4","c":"White builds the broad two-pawn center — strong now, a target later."},{"u":"d7d5","san":"d5","c":"Challenge e4 immediately — the supported ...d5 strike is the point of the opening.","a":["d5e4"]},{"u":"e4e5","san":"e5","c":"The Advance. Same chain as the French Advance (d4–e5) — but watch what Black does with the move the French never gets.","k":["d4","e5"]},{"u":"c8f5","san":"Bf5","c":"THE move that makes the Caro-Kann: the bishop escapes to its perfect diagonal BEFORE ...e6 closes the door. The whole opening exists for this tempo. Black now has the French's solidity without its one structural sorrow.","k":["f5"]},{"u":"g1f3","san":"Nf3","c":"White develops sensibly. (The aggressive tries g4!? and h4 exist — meet them calmly with ...e6/...h5; your bishop always finds safety on g6/h7.)"},{"u":"e7e6","san":"e6","c":"NOW close the chain — the bishop is already outside. Black's structure is the French Advance with a perfect light-squared bishop: strictly better version.","k":["d5","e6"]},{"u":"f1e2","san":"Be2","c":"White prepares to castle."},{"u":"b8d7","san":"Nd7","c":"Flexible development: the knight supports the coming ...c5 strike at d4's base. The other knight will choose e7, heading for f5 or g6."},{"u":"e1g1","san":"O-O","c":"White castles, completing the opening's first duty."},{"u":"g8e7","san":"Ne7","c":"The signature Caro maneuver: this knight reroutes to f5 (hitting d4) or g6 (hitting e5 and f4). From here: ...c5, ...Be7/...Nb6, castle either side. Black's position plays itself — see the strategy notes.","k":["f5","g6"]}]},{"name":"Exchange Variation","intro":"White trades on d5 hoping for an easy, symmetric game — but unlike the French Exchange, there's a real fight here: White takes the d3-square first with the bishop, trying to deny Black's c8-bishop its dream development. Black equalizes with precise, natural moves.","plan":"This is the 'Carlsbad' structure (mirrored): expect White to try the minority-attack idea in reverse or simple piece play. Black's plan: complete development (...e6, ...Bd6 or ...Be7, ...O-O), place the rooks on c8/e8, and use the half-open c-file — ...Qb6 and ...Rc8 pressure b2/c3. The g4-bishop pin on f3 is Black's active resource; retreating it to h5/g6 keeps long-term pressure. Endgames are level or better for Black: the structure is symmetric and weakness-free. Just don't fall for early Qb3 tricks against b7 — ...Qd7 or ...Qc8 holds everything.","moves":[{"u":"e2e4","san":"e4","c":"White takes the center."},{"u":"c7c6","san":"c6","c":"The Caro-Kann — prepare ...d5 while keeping the bishop's diagonal free."},{"u":"d2d4","san":"d4","c":"White builds the broad two-pawn center — strong now, a target later."},{"u":"d7d5","san":"d5","c":"Challenge e4 immediately — the supported ...d5 strike is the point of the opening.","a":["d5e4"]},{"u":"e4d5","san":"exd5","c":"The Exchange — White avoids theory and aims for a small, clean edge.","k":["d5"]},{"u":"c6d5","san":"cxd5","c":"Black recaptures with the c-pawn (the only legal pawn capture — and a good one): the structure stays symmetric and the c-file is half-open for Black's rooks.","k":["c6"]},{"u":"f1d3","san":"Bd3","c":"The point of White's move order: occupy the b1–h7 diagonal FIRST, denying Black's bishop the f5-square it lives for. A small battle for one diagonal — these things decide openings.","a":["d3f5"],"k":["f5"]},{"u":"b8c6","san":"Nc6","c":"Black develops actively, pressuring d4."},{"u":"c2c3","san":"c3","c":"White solidifies d4 and opens the queen's path to b3 — watch for tricks against b7 now that the c8-bishop wanders.","k":["b7"]},{"u":"g8f6","san":"Nf6","c":"Natural development toward e4."},{"u":"c1f4","san":"Bf4","c":"White grabs the good diagonal — a London-style setup with colors telling a different story."},{"u":"c8g4","san":"Bg4","c":"Denied f5, the bishop finds activity anyway: pinning pressure against f3/d4 ideas (after ...e6, White's d4 always needs watching). Black follows with ...e6, ...Bd6 or ...Be7, ...O-O and full equality. See the strategy notes for the middlegame plans.","a":["g4d1"],"k":["d4"]}]}]}]};

const DATA_ZH = {"openings":[{"name":"意大利开局","desc":"最古老的开局之一。白方快速出子，将象瞄准 f7——黑方最薄弱的格子。","lines":[{"name":"意大利稳健式（主线）","intro":"这盘“安静的对局”是完美的入门开局：每一步都遵循黄金法则——争夺中心、每步出一个新子、尽早王车易位。双方在交火之前先建立稳固的阵型。","plan":"双方易位后，白方的经典计划是缓慢布置：Re1、Nbd2，再把马经 Nf1–g3 调往王翼，最后一举推进 d4。黑方对称地走 ...Re8、...a6、...Ba7 保留主教。关键的战场格子是 d5 和 f5——谁先在那里落下一只马，通常就能占据更好的中局。不要在 c4/c5 上无谓地兑掉你的好象。","moves":["占据一份中心，并为皇后和 f1 象打开通路。中心兵控制了关键的 d5 和 f5 格。","黑方提出对等的要求。对称意味着双方在同样的中心格上公平较量。","带威胁地出子——马攻击 e5，黑方必须应对。“带先手”出子意味着对手无法忽视你。","最自然的回应：守住 e5 同时出子。用子力防守胜过 ...d6 这种会堵住主教的兵步。","意大利象走上最佳斜线，直指 f7——黑方唯一只靠王防守的格子。许多新手的攻击（和陷阱）都围绕 f7。","黑方对称应对，反过来盯住 f2。这只象还控制 d4，抑制白方的中心扩张。","带计划的兵步：准备 d4，建立宽广的中心。注意白方在主要子力出动之前先按兵不动。新手常犯的错是出子之前先乱推兵。","黑方出动易位所需的最后一个轻子，并反击 e4。白方若大意，...Nxe4 就能赢兵。","稳健地守 e4。立刻走 5.d4 会引向尖锐局面；d3 保持中心稳定——白方稍后会妥善准备 d4。慢但安全。","黑方同样巩固 e5。双方都完成了开局的首要目标：稳固的中心和准备易位的子力。","易位！发动攻击之前，王的安全永远是第一位。车也走向它应属的中心线。","两位王都已安顿好。开局完成：真正的对局现在开始——完成本线后请看战略提示。"]},{"name":"两马防御（稳健式）","intro":"当黑方走 3...Nf6 而非 3...Bc5 时，立刻反击 e4。白方最冷静的回应是 d3，绕开狂野的“油炸肝”复杂变化，同时保持健康灵活的阵型。","plan":"白方的布置与意大利稳健式相同：c3、Re1、Nbd2–f1–g3，再走 d4 突破。黑方最积极的计划是在白方迟缓时一步走 ...d5，或标准的 ...a6、...Ba7 重新布置。留意黑方走 ...d5 的时机：exd5 Nxd5 之后，你应在黑方巩固之前迅速冲击中心。","moves":["占据中心，解放主教和皇后。","黑方要求对等的一份。","出子并攻击 e5——迫使黑方处理威胁。","用子力守住 e5。","瞄准 f7——意大利式布置。","两马防御：黑方不再对称，而是立刻反击 e4。这更具战斗性——它诱使白方用 Ng5 抢子，引向混乱。","成熟的选择。4.Ng5 攻击 f7 能强行赢子，但由此产生的局面极其锋利。d3 只是守住 e4，保持舒适的对局。","黑方稳健出子。注意 ...Bc5 也可行，会转入意大利稳健式的水域。Be7 最稳——它永远不会成为攻击目标。","先于一切易位。白方阵型自行运转：每个子都有明显的好格。","黑方完成王翼出子。","车在 e 线尚未打开时就先占据它。当中心最终因 d4xe5 或 ...d5 而打开时，这只车早已就位。","黑方加固 e5。从此双方调度：白方盯住 d4 和王翼，黑方寻求 ...d5 或 ...Be6 来兑掉强大的意大利象。"]},{"name":"埃文斯弃兵","intro":"目的明确的弃兵：b4！把黑方的象引开，再用 c3 和 d4 建立庞大的中心，而黑方却用同一只象浪费时间。从莫菲到卡斯帕罗夫，攻击型棋手都钟爱它。","plan":"白方的补偿是实打实的：庞大的中心、打开的线路，以及 2–3 步的出子领先。常见后续是 Qb3（攻击 f7）、Ba3（阻止易位！）以及 e5 驱赶 f6 马。弃兵play的黄金法则：绝不兑皇后、不断制造威胁、在黑方理顺之前打开局面。若黑方撑到残局，多兵会取胜——所以要充满活力地行棋。","moves":["在中心立桩，为皇后和象打开线路。","黑方要求一份。","带先手出子，攻击 e5。","用子力守 e5，同时朝中心出子。","意大利象，瞄准 f7。","黑方走上古典格。","埃文斯弃兵！白方献出一个翼兵，把黑象引离它的好斜线并争取时间。兵本身不重要，重要的是白方换来的先手和中心。","黑方接受——关键的考验。用 ...Bb6 谢绝更安全，但会白白让白方占据空间。","要点：再次攻击这只象，又得一先手，并准备 d4 推进。黑象至此已走了三次，而白方每步都在出子。","主要退法，保留 c3 上的牵制思路。...Be7 和 ...Bc5 也是选择，各有白方可利用的缺陷。","庞大的中心带着又一个威胁到来。白方的兵和子协同一致；黑方只有一个出动的子——还被满盘驱赶。","黑方再抓一兵，却越发落后。贪婪正是埃文斯弃兵中白方攻击的引擎。","风暴中的冷静：易位、联通双车，准备 cxd4 或 Qb3。白方少两兵，但实际上多四步先手——在开放局面里这是一笔取胜的交易。"]}]},{"name":"西班牙开局","desc":"“西班牙对局”。白方对守卫 e5 的马施压——也许是所有开局中最古典的一个。","lines":[{"name":"主线（封闭式）","intro":"西班牙开局向黑方提出一个长期问题：b5 象施压 c6 马，而后者是 e5 的唯一守卫者。白方并不威胁立刻赢兵——这是可以持续 30 步的位置压力。","plan":"封闭西班牙是缓慢的调度战。白方的标准计划：h3（阻止 ...Bg4）、d4，以及著名的马调度 Nb1–d2–f1–g3 奔向 f5。黑方以 ...Na5 攻象、...c5 和 ...Qc7 争取后翼空间回应。不要急——每步改善你最差的子。e4/e5 的兵张力决定一切：谁草率地解除它，就把中心送给对方。","moves":["在中心立桩，为皇后和象打开线路。","黑方古典地回应。","带先手出子——马攻击 e5，迫使回应。","用子力守 e5，同时朝中心出子。","西班牙之着。不同于意大利直攻 f7，这是针对 e5 的“守卫者”。潜在威胁：Bxc6 接 Nxe5。它现在还不奏效——但黑方必须时刻提防。","莫菲防御——立刻提出质问。若象吃子，黑方得双象；若象后退，...b5 稍后还能再次驱赶它。世界上下得最多的局面在此步之后出现。","保持张力。象仍透过 a4–e8 斜线盯住 c6，而 ...b5 会松动黑方后翼——日后 a4 突破的目标。","出子并攻击 e4。现在白方面临黑方刚才的同一问题：守兵还是无视威胁？","无视它！若黑方吃 e4（“开放西班牙”），白方用 d4 和 Re1 取回兵——e 线的牵制极其致命。“迎着”威胁易位是著名的一课：要计算，而非条件反射。","黑方谢绝吃兵，准备易位。稳健的主干道。","现在 e4 真正得到防守，重新制造 Bxc6 和 Nxe5 的位置威胁。黑方的下一步几乎是被迫的——你能看出为什么吗？","由于重新出现的威胁，黑方终于彻底解除 a4–e8 的牵制思路。代价：后翼兵稍有松动，日后白方可用 a4 来攻击。","象落到它永久的家，仍沿 a2–g8 斜线虎视 f7。在许多变化里，它会成为盘面上最危险的子。","黑方加固 e5 并打通 c8 象的去路。安静的巩固。","一举两得：准备 d4 推进，并在 c2 造一个退路，使 ...Na5 永远赢不到双象。预防——在对手计划发生之前就阻止它。","主线基本型。白方将续走 h3 再 d4；黑方在 ...Na5、...Bb7 或 ...Re8 的布置间选择。整整一生的棋艺都藏在这个局面里。"]},{"name":"兑变（Exchange）","intro":"白方用宝贵的象去换取一个清晰简单的资产：黑方的叠 c 兵。深层思路是——在纯兵残局里，白方健康的王翼多数兵能造出通路兵，而黑方残缺的后翼多数兵却不能。这是鲍比·费舍尔最爱的捷径。","plan":"白方的策略极其清晰：兑子（不是兑兵！）、走 d4、奔向任何残局。每一次兑换都提升优越兵形的价值。黑方的补偿是双象——所以黑方应保持局面复杂、避免兑换、利用半开放 d 线。作为白方：马调往王翼，f4–f5 多数兵推进。算到残局：健康的 4 兵对 3 兵，胜过 4 兵对叠起的 4 兵。","moves":["在中心立桩，为皇后和象打开线路。","黑方古典地回应，要求对等的一份中心。","带先手出子——马攻击 e5，迫使回应。","用子力守 e5，同时朝中心出子。","西班牙象对守卫者施压。","莫菲防御——立刻质问象的意图。","兑变：白方主动放弃双象——以换取永久的兵形损伤。这笔交易只有在黑方必须用兵回吃、从而叠起 c 兵时才成立。","朝中心回吃并解放 c8 象。（...bxc6 会把象埋住，兵形更糟。）黑方押注双象带来的活力。","先易位——5.Nxe5? 立刻被 ...Qd4! 反击，同时叉马和 e4 兵，取回兵且局面良好。著名的陷阱；自己验证一下！","黑方以丑陋但稳固的方式加固 e5。叠兵确实有一个馈赠：它们控制了极佳的中心格。","趁出子领先时出击。白方想清算中心并驶向有利的残局。","黑方兑子——若以 ...exd4 谢绝守住中心，最终也会丢兵。","盘点局势：白方有健康的王翼 4 对 3 多数兵和出子领先；黑方有双象和半开放 d 线。从此每一次兑子都对白方有利——边走边记住这一点。"]},{"name":"柏林防御","intro":"“柏林墙”——黑方对西班牙最稳固的回应，因克拉姆尼克在 2000 年借此把卡斯帕罗夫拉下王座而闻名。黑方接受略差的兵形并失去易位权，但换来双象和一个毫无弱点、堡垒般的残局。","plan":"这“本身”就是残局——皇后在第 8 步就下场。白方的资产：王翼多数兵和黑方错位的王。黑方的资产：双象和坚如磐石的兵形。白方应推进王翼兵（h3、g4、e5–e6 的思路）并在黑方协调之前激活双车。黑方走 ...Ke8–c8、...b6、...Bb7，单纯地耗下去。这里耐心取胜；急躁致败。","moves":["在中心立桩，为皇后和象打开线路。","黑方古典地回应，要求对等的一份中心。","带先手出子——马攻击 e5，迫使回应。","用子力守 e5，同时朝中心出子。","西班牙象瞄准守卫 e5 的那只马。","柏林防御：立刻出子并反击 e4，省去 ...a6。黑方提出进入深奥的技术性水域。","有原则的回应——用战术而非兵步来守 e4。白方诱使 Nxe4，因为它看得更远。","黑方上钩了——但这并不真是诱饵。这是理论：黑方知道兵会回来，但相信由此产生的残局可守。看白方如何取回它。","关键之着：在回吃之前先在中心反击。威胁 d5 叉子，并打通皇后通往 d8 的路。黑方无法保住多兵。","最佳——马带先手后退，攻击 b5 象。柏林的每一步都有这种一举两得的特质；这正是它难以攻破的原因。","插入着：先吃马，在回吃 e5 之前先破坏黑方兵形。","黑方接受叠兵以解放象——与兑变同样的兵形故事。","取回兵的同时驱赶 d6 马。注意 d 线如今完全打开——双方皇后都站在线上。","马找到它唯一的好格，盯住 d4 和 e3 的洞。","进入著名的柏林残局。白方兑皇后，正是因为黑方的王必须回吃——从此永远失去易位权。","柏林墙屹立：黑方的王困在中心，h8 车难以激活——但局面没有可攻的弱点。从此是技术性的棋；请看战略提示。"]}]},{"name":"西西里防御","desc":"黑方对 1.e4 最流行、最具战斗性的回应。用 c 兵不对称地争夺中心。","lines":[{"name":"纳道夫式","intro":"纳道夫是西西里中的劳斯莱斯——费舍尔与卡斯帕罗夫的选择。小小的 ...a6 为一切做准备：不许 Nb5 地走 ...e5，以及用 ...b5 进行后翼扩张。黑方从第一步起就为取胜而战。","plan":"黑方的典型方案：...e5（或 ...e6）、...Be7、...O-O，然后是针对白方后翼的标志性 ...b5–b4 兵推——常常与白方自己的王翼进攻赛跑。d5 格是黑方永恒的隐忧：绝不让白马在那里安家。记住西西里的黄金法则：黑方的反击沿半开放 c 线展开（...Rc8、...Qc7，施压 c2/c3）。若白方长易位，赛跑就开始了——推动那些后翼兵！","moves":["白方占据中心。","西西里！黑方不对称，而是从翼侧争夺 d4。深层要点：当白方最终走 d4 而黑方兑换时，黑方用一个“翼兵”换来一个“中心兵”——长期的兵形获利。","白方准备 d4——开放西西里，最具考验性的走法。","控制 e5（阻止 e4–e5 推进）并打通 c8 象的斜线。灵活的纳道夫走法顺序。","白方打开中心，接受兵形交换以换取子力活跃和出子领先。","基石性的兑换：翼兵换中心兵。黑方如今拥有半开放 c 线——日后一切反击的高速公路。","白方回吃，把马置于中心。","带先手出子——e4 现在需要防守。","白方用自然的出子步守住 e4。","纳道夫之着。它看似消极——其实绝非如此。它从白方双马和象手中夺走 b5，准备 ...e5（否则 Nb5 会惩罚它）以及 ...b5 扩张。一步就为整个中局做好准备。"]},{"name":"开放西西里（古典式）","intro":"古典西西里：黑方在再走任何兵之前，先把双马调到各自最佳的格子。稳健、灵活，是学习开放西西里结构而又不必背诵强制变化的好途径。","plan":"黑方的标准出子：...e6（或 ...g6）、...Be7、...O-O、...Qc7，双车到 c8/d8。每一种开放西西里反复出现的主题都适用：沿 c 线施压、在适当时机用 ...d5 突破来解放局面、以及对 d5 格的警惕。白方通常以 f3/Be3/Qd2 加王翼兵推进进攻，或用 Bc4 施压——以中心的 ...d5 反击来回应翼侧进攻。","moves":["白方占据中心。","西西里——不对称地争夺
